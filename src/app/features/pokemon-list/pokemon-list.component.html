<div>
    <h1>La Liste des Pokemon</h1>

    @if (pokemonList | async; as Liste) {
        <ul class="grid">
            @for (pokemon of Liste.results; track pokemon.name) {
                <li>{{pokemon.name}} <button (click)="goToDetails(pokemon.name)">Voir le détail</button></li>
            }
        </ul>
    }

    <button (click)="addOffset()">+10</button>
    <button (click)="substractOffset()">-10</button>

    <button (click)="goToTrainerPage()">Page du dresseur</button>
</div>
